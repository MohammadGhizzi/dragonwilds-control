<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="color-scheme" content="dark" />
<title>Palworld Control</title>
<style>
:root {
  --bg:#0c1118; --panel:#141b25; --panel2:#1b2532; --line:#283445;
  --text:#e7edf5; --muted:#8c99aa; --accent:#62c7ff; --green:#49d486;
  --red:#ef6767; --yellow:#f2c75c; --blue:#77a9ff;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.wrap{max-width:1180px;margin:0 auto;padding:22px 18px 70px}
header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px}
h1{margin:0;font-size:23px;letter-spacing:.2px}
.brand{display:flex;align-items:center;gap:10px}
.dot{width:11px;height:11px;border-radius:50%;background:var(--muted);box-shadow:0 0 0 4px rgba(255,255,255,.04)}
.dot.up{background:var(--green);box-shadow:0 0 0 4px rgba(73,212,134,.16)}
.dot.down{background:var(--red);box-shadow:0 0 0 4px rgba(239,103,103,.16)}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
.span4{grid-column:span 4}.span6{grid-column:span 6}.span8{grid-column:span 8}.span12{grid-column:span 12}
h2{margin:0 0 12px;color:var(--muted);font-size:13px;letter-spacing:.7px;text-transform:uppercase}
.kv{display:grid;grid-template-columns:140px 1fr;gap:7px 12px}
.k{color:var(--muted)}.v{font-variant-numeric:tabular-nums;min-width:0;overflow-wrap:anywhere}
code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
.btn{border:1px solid transparent;border-radius:7px;color:white;padding:8px 12px;font-weight:700;background:#324154}
.btn:hover{filter:brightness(1.1)}.btn:disabled{opacity:.5;cursor:not-allowed}.btn:active{transform:translateY(1px)}
.start{background:#1f8a4d}.stop{background:#aa3d3d}.restart{background:#a66c1d}.save{background:#245f9e}.neutral{background:#324154}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tab{padding:7px 10px;border:1px solid var(--line);border-radius:7px;background:transparent;color:var(--muted)}
.tab.active{background:var(--panel2);color:var(--text);border-color:#3b4c63}
.players{display:flex;flex-wrap:wrap;gap:7px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:20px;border:1px solid var(--line);background:var(--panel2);font-size:12.5px}
.empty{color:var(--muted);font-style:italic}
.temp.ok{border-color:#244d34;color:#a7efbf}.temp.mid{border-color:#31557b;color:#9fd2ff}.temp.warn{border-color:#6f5920;color:#ffdd79}.temp.hot{border-color:#713232;color:#ff9999}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.field{border:1px solid var(--line);background:#101720;border-radius:7px;padding:10px;min-width:0}
.field label{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.field .name{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.5px;color:#dce6f3;overflow:hidden;text-overflow:ellipsis}
.field .desc{color:var(--muted);font-size:12px;margin-top:6px;min-height:17px}
.help-text{color:#b7c4d5;font-size:12px;line-height:1.42;margin-top:7px}
.help-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;padding:2px 7px;color:var(--muted);font-size:11px;background:rgba(255,255,255,.025)}
.tag.warn{border-color:#6f5920;color:#ffdd79}.tag.net{border-color:#31557b;color:#9fd2ff}.tag.restart{border-color:#5e4d7a;color:#d8c8ff}.tag.sec{border-color:#713232;color:#ffaaaa}.tag.perf{border-color:#244d34;color:#a7efbf}
.field input:not([type=checkbox]),.field select,.field textarea{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:8px 9px;min-width:0}
.field textarea{height:70px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.checkrow{display:flex;align-items:center;gap:8px;padding:7px 0}
.bool-state{font-weight:700;color:var(--muted)}
.bool-state.enabled{color:var(--green)}
.bool-state.disabled{color:#b7c4d5}
.bool-state.dirty{color:var(--yellow)}
.settings-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.search{min-width:260px;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:7px;padding:8px 10px}
.logs{height:320px;overflow:auto;white-space:pre;font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#06090e;border:1px solid var(--line);border-radius:8px;padding:10px}
.warn{color:#ffd06e}.err{color:#ff9292}.good{color:#9ce9b6}.net{color:#8bd4ff}
.login{max-width:430px;margin:13vh auto 0}.login h1{margin-bottom:4px}.login p{margin:0 0 18px;color:var(--muted)}
.login label{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-size:12px;margin:12px 0 6px}
.login input{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:7px;padding:10px 11px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.toast{position:fixed;right:16px;bottom:16px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 13px;box-shadow:0 10px 25px rgba(0,0,0,.35)}
.toast.err{border-color:#8a3b3b}.toast.ok{border-color:#2a7447}
.small{font-size:12px;color:var(--muted)}
@media(max-width:820px){.span4,.span6,.span8{grid-column:span 12}.form-grid{grid-template-columns:1fr}.kv{grid-template-columns:120px 1fr}header{align-items:flex-start;flex-direction:column}.search{min-width:100%;width:100%}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const DEFAULT_API = 'https://moha-eos.tailb7a05f.ts.net';
let API = localStorage.getItem('pal_api') || DEFAULT_API;
let TOKEN = localStorage.getItem('pal_token') || '';
let state = { status:null, settings:null, group:null, search:'' };
let REQUEST_BUSY = false;
const $ = (s, el=document) => el.querySelector(s);
const app = $('#app');

function esc(v){return String(v ?? '').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmtBytes(n){if(!n && n!==0)return '-'; const u=['B','KB','MB','GB','TB']; let i=0,x=n; while(x>=1024&&i<u.length-1){x/=1024;i++} return `${x.toFixed(i?1:0)} ${u[i]}`}
function fmtUptime(s){if(!s && s!==0)return '-'; s=Math.floor(s); const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h?`${h}h ${m}m`:`${m}m`}
function toast(msg, ok=true){const t=document.createElement('div');t.className=`toast ${ok?'ok':'err'}`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3600)}
function playerImpact(){const n=state.status?.players?.length||0;return n?` This will disconnect ${n} connected player${n===1?'':'s'}.`:''}
async function runBusy(work){
  if(REQUEST_BUSY)return;
  REQUEST_BUSY=true;
  const buttons=[...document.querySelectorAll('button')];
  const disabled=buttons.map(b=>b.disabled);
  buttons.forEach(b=>b.disabled=true);
  try{await work()}
  finally{REQUEST_BUSY=false;buttons.forEach((b,i)=>b.disabled=disabled[i])}
}
async function req(path, opts={}){
  const headers = opts.headers || {};
  if(TOKEN) headers.Authorization = `Bearer ${TOKEN}`;
  if(opts.body && !(opts.body instanceof FormData)) headers['Content-Type']='application/json';
  const r = await fetch(API.replace(/\/$/,'') + path, {...opts, headers});
  const txt = await r.text();
  let data; try{data=txt?JSON.parse(txt):{}}catch{data={ok:false,error:txt}}
  if(!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}
function tempClass(c){return c>=75?'hot':c>=65?'warn':c>=55?'mid':'ok'}
function caps(){return state.status?.capabilities || state.settings?.capabilities || {actions:[],canEditSettings:false,canEditStartup:false,showTemperatures:false}}
function canAction(a){return (caps().actions || []).includes(a)}
function canEditSettings(){return !!caps().canEditSettings}
function canEditStartup(){return !!caps().canEditStartup}

const SETTING_HELP = {
  Difficulty:{text:'Preset name from Palworld. On dedicated servers, None is the normal default/custom ruleset; the real difficulty comes from the individual rate sliders below.',tags:['restart']},
  RandomizerType:{text:'Changes how Pal spawns are randomized. Use carefully because randomizer changes can make the world feel very different.',tags:['restart','warn']},
  RandomizerSeed:{text:'Seed used by the randomizer. Same seed plus same randomizer mode should give consistent randomized results.',tags:['restart']},
  bIsRandomizerPalLevelRandom:{text:'When enabled, randomized Pals can also get randomized levels. This can make early areas unexpectedly dangerous.',tags:['restart','warn']},
  DayTimeSpeedRate:{text:'Multiplier for how fast daytime passes. Higher means shorter days; lower means longer days.',tags:['restart']},
  NightTimeSpeedRate:{text:'Multiplier for how fast nighttime passes. Higher means shorter nights; lower means longer nights.',tags:['restart']},
  ExpRate:{text:'Multiplier for player and Pal experience gain. Higher makes leveling faster; lower makes progression slower.',tags:['restart']},
  PalCaptureRate:{text:'Multiplier for capture chance. Higher makes spheres more forgiving; lower makes capturing harder.',tags:['restart']},
  PalSpawnNumRate:{text:'Multiplier for wild Pal spawn density. Raising it can make the world feel alive, but it is one of the settings most likely to increase CPU/network load.',tags:['restart','performance']},
  PalDamageRateAttack:{text:'Damage dealt by Pals. Raise for harder wild Pal/base combat; lower if enemies feel too punishing.',tags:['restart']},
  PalDamageRateDefense:{text:'Damage Pals receive. Higher means Pals take more damage; lower makes them tankier.',tags:['restart']},
  PlayerDamageRateAttack:{text:'Damage dealt by players. Higher makes weapons/attacks stronger; lower makes fights longer.',tags:['restart']},
  PlayerDamageRateDefense:{text:'Damage players receive. Higher makes players more fragile; lower makes players tankier.',tags:['restart']},
  DeathPenalty:{text:'What players drop on death. All is the harshest; None removes death drops.',tags:['restart','warn']},
  bHardcore:{text:'Hardcore death behavior. This can permanently punish death, so do not enable casually on a shared server.',tags:['restart','warn']},
  bPalLost:{text:'Makes Pals lost on death. Very punishing; treat as hard-mode/permadeath style.',tags:['restart','warn']},
  bCharacterRecreateInHardcore:{text:'Allows creating a new character after hardcore death instead of being fully locked out.',tags:['restart','warn']},
  bEnablePlayerToPlayerDamage:{text:'Allows players to damage each other. Keep off for normal co-op.',tags:['restart']},
  bEnableFriendlyFire:{text:'Allows friendly fire. Can cause accidental damage in co-op.',tags:['restart']},
  bIsPvP:{text:'Turns on PvP world behavior. Leave off for a friends-only co-op server unless everyone wants PvP.',tags:['restart']},
  PlayerStomachDecreaceRate:{text:'Player hunger drain multiplier. Higher drains food faster; lower makes survival easier.',tags:['restart']},
  PlayerStaminaDecreaceRate:{text:'Player stamina drain multiplier for sprinting, climbing, etc. Higher feels harsher; lower feels smoother.',tags:['restart']},
  PlayerAutoHPRegeneRate:{text:'Player passive HP regeneration multiplier while awake.',tags:['restart']},
  PlayerAutoHpRegeneRateInSleep:{text:'Player HP regeneration multiplier while sleeping.',tags:['restart']},
  PalStomachDecreaceRate:{text:'Pal hunger drain multiplier. Higher means base Pals need food more often.',tags:['restart']},
  PalStaminaDecreaceRate:{text:'Pal stamina drain multiplier. Affects how quickly Pals tire from actions such as flying or combat.',tags:['restart']},
  PalAutoHPRegeneRate:{text:'Pal passive HP regeneration multiplier while active.',tags:['restart']},
  PalAutoHpRegeneRateInSleep:{text:'Pal HP regeneration multiplier while resting/sleeping or recovering.',tags:['restart']},
  BuildObjectHpRate:{text:'Building health multiplier. Higher makes bases harder to destroy.',tags:['restart']},
  BuildObjectDamageRate:{text:'Damage applied to buildings. Higher makes structures break faster when attacked.',tags:['restart']},
  BuildObjectDeteriorationDamageRate:{text:'Base decay/deterioration speed. Lower reduces decay; 0 usually means no deterioration damage.',tags:['restart']},
  CollectionDropRate:{text:'Amount of resources gained from gathering. Higher speeds up farming; lower slows progression.',tags:['restart']},
  CollectionObjectHpRate:{text:'Health of gatherable objects like trees and rocks. Higher means more hits before breaking.',tags:['restart']},
  CollectionObjectRespawnSpeedRate:{text:'Respawn timing for gatherable objects. Changing this affects how quickly resources return.',tags:['restart']},
  EnemyDropItemRate:{text:'Quantity/rate of drops from defeated enemies. Higher gives more loot.',tags:['restart']},
  DropItemMaxNum:{text:'Maximum loose dropped items in the world. Higher can reduce despawns but may hurt performance.',tags:['restart','performance']},
  DropItemAliveMaxHours:{text:'How long dropped items stay before despawning. Higher is convenient but can increase world clutter.',tags:['restart','performance']},
  ItemWeightRate:{text:'Item weight multiplier. Lower means players can carry more; higher makes inventory management harsher.',tags:['restart']},
  ItemCorruptionMultiplier:{text:'Item corruption speed multiplier. Higher means items decay/corrupt faster if that system applies.',tags:['restart']},
  EquipmentDurabilityDamageRate:{text:'How fast equipment loses durability. Lower is more relaxed; higher is harsher.',tags:['restart']},
  BaseCampMaxNum:{text:'Total base camps allowed on the server. Higher allows more bases but more world simulation.',tags:['restart','performance']},
  BaseCampWorkerMaxNum:{text:'Maximum worker Pals per base. This directly affects base simulation load; keep modest on the laptop.',tags:['restart','performance']},
  BaseCampMaxNumInGuild:{text:'Maximum bases a guild can own. More bases means more persistent base activity.',tags:['restart','performance']},
  MaxBuildingLimitNum:{text:'Building cap. 0 means unlimited; limiting can help prevent huge bases from hurting performance.',tags:['restart','performance']},
  WorkSpeedRate:{text:'Multiplier for base work/crafting speed. Higher speeds up chores.',tags:['restart']},
  GuildPlayerMaxNum:{text:'Maximum players in one guild. For your 4-player server, 4 is usually enough.',tags:['restart']},
  GuildRejoinCooldownMinutes:{text:'Cooldown before a player can rejoin a guild, in minutes.',tags:['restart']},
  bAutoResetGuildNoOnlinePlayers:{text:'Deletes/reset guild assets after no guild members log in for the configured time. Dangerous for friend servers unless everyone agrees.',tags:['restart','warn']},
  AutoResetGuildTimeNoOnlinePlayers:{text:'Offline time before guild reset triggers when auto-reset is enabled.',tags:['restart','warn']},
  PalEggDefaultHatchingTime:{text:'Base hatch time for huge eggs in hours; smaller eggs scale from it. Lower for less waiting.',tags:['restart']},
  bEnableInvaderEnemy:{text:'Enables raids/invaders. Turning it off makes bases safer.',tags:['restart']},
  bEnableFastTravel:{text:'Enables fast travel. Turn off only for challenge runs.',tags:['restart']},
  bEnableFastTravelOnlyBaseCamp:{text:'Restricts fast travel so players can only fast travel from bases.',tags:['restart']},
  bIsStartLocationSelectByMap:{text:'Lets new players choose their starting location from the map.',tags:['restart']},
  bExistPlayerAfterLogout:{text:'Keeps logged-out characters in the world. More immersive, but can expose sleepers to danger depending on settings.',tags:['restart']},
  SupplyDropSpan:{text:'Time between supply drop / meteor-style events, in minutes.',tags:['restart']},
  EnablePredatorBossPal:{text:'Enables Predator Boss Pals. Can make the world more dangerous.',tags:['restart']},
  ServerReplicatePawnCullDistance:{text:'Distance in centimeters where creatures/players are replicated to clients. Higher can reduce pop-in but costs more network/CPU.',tags:['restart','performance','network']},
  ItemContainerForceMarkDirtyInterval:{text:'How often containers force a sync/update. Lower may feel more responsive but can increase server work.',tags:['restart','performance']},
  ServerName:{text:'Name shown for the server.',tags:['restart']},
  ServerDescription:{text:'Description shown for the server, mostly useful for listings or remembering the server purpose.',tags:['restart']},
  AdminPassword:{text:'Admin password and REST API basic-auth password. Keep this private.',tags:['restart','security']},
  ServerPassword:{text:'Password players use to join. Share only with friends.',tags:['restart','security']},
  ServerPlayerMaxNum:{text:'Maximum players allowed by config. Startup players should match this; your target is 4.',tags:['restart']},
  PublicIP:{text:'Public IP advertised by the server. Set this only when needed; wrong values can break external joining/listing.',tags:['restart','network']},
  PublicPort:{text:'Public port advertised by the server. Must match router forwarding if used publicly.',tags:['restart','network']},
  Region:{text:'Region label for server listing. It does not change routing by itself.',tags:['restart']},
  bUseAuth:{text:'Uses Palworld authentication. Usually keep enabled.',tags:['restart','security']},
  bAllowClientMod:{text:'Allows modded clients to join. Convenient for friends, but less strict than vanilla-only.',tags:['restart','security']},
  CrossplayPlatforms:{text:'Platform allow-list such as Steam, Xbox, PS5, Mac. Removing a platform can block those players.',tags:['restart']},
  BanListURL:{text:'Remote ban list URL used by Palworld.',tags:['restart','security']},
  bShowPlayerList:{text:'Shows the player list in-game.',tags:['restart']},
  ChatPostLimitPerMinute:{text:'Chat rate limit per player. Lower helps spam control.',tags:['restart']},
  bIsShowJoinLeftMessage:{text:'Shows join/leave messages in chat/logs.',tags:['restart']},
  DenyTechnologyList:{text:'List of technologies to disable. Use exact internal IDs; bad values may do nothing.',tags:['restart','warn']},
  RCONEnabled:{text:'Remote console interface. Keep disabled unless you specifically need RCON and secure it.',tags:['restart','security']},
  RCONPort:{text:'TCP port for RCON if enabled. Do not expose publicly without a strong reason.',tags:['restart','security','network']},
  RESTAPIEnabled:{text:'Palworld local REST API. The control panel depends on it, but Docker binds it to localhost only.',tags:['restart','security']},
  RESTAPIPort:{text:'TCP port for the local Palworld REST API. The control proxy expects 8212.',tags:['restart','network']},
  LogFormatType:{text:'Server log format. Text is easiest to read in this panel; Json is better for machines.',tags:['restart']},
  bIsUseBackupSaveData:{text:'Enables Palworld built-in backup save behavior.',tags:['restart']},
  AutoSaveSpan:{text:'Seconds between autosaves. Lower saves more often but can cause small save hitches; higher risks losing more progress after a crash.',tags:['restart','performance']},
  bAllowGlobalPalboxExport:{text:'Allows moving Pals into Global Palbox.',tags:['restart']},
  bAllowGlobalPalboxImport:{text:'Allows bringing Pals from Global Palbox into this world. Leave off if you want server-only progression.',tags:['restart']},
};
const STARTUP_HELP = {
  port:{text:'UDP port the server listens on. Router forwarding must match this. You are currently using 27015, with 27016 also exposed for Palworld companion traffic.',tags:['restart','network']},
  players:{text:'Launch-time max player count. Keep this at 4 for your laptop to avoid wasting RAM/CPU.',tags:['restart','performance']},
  NumberOfWorkerThreadsServer:{text:'Server worker thread count. 8 is reasonable for the Ryzen 5500U; too high can add overhead instead of speed.',tags:['restart','performance']},
  logformat:{text:'Launch log format. Text is easiest for live troubleshooting.',tags:['restart']},
  useperfthreads:{text:'Enables Palworld performance threads. Usually good for dedicated servers.',tags:['restart','performance']},
  NoAsyncLoadingThread:{text:'Palworld startup/runtime threading flag used by the dedicated-server docs. Keep as-is unless testing a specific issue.',tags:['restart','performance']},
  UseMultithreadForDS:{text:'Dedicated-server multithreading flag. Keep enabled for this CPU.',tags:['restart','performance']},
  publiclobby:{text:'Lists the server publicly/community-style. Keep off for private friend servers.',tags:['restart','security']},
  publicip:{text:'Public lobby IP override. Leave blank unless public listing needs a fixed advertised IP.',tags:['restart','network']},
  publicport:{text:'Public lobby port override. Leave blank unless public listing needs an explicit port.',tags:['restart','network']},
};
function tagClass(t){return t==='restart'?'restart':t==='network'?'net':t==='security'?'sec':t==='performance'?'perf':t==='warn'?'warn':''}
function defaultHelp(f){
  const name = f.name || '';
  if(/password/i.test(name)) return 'Sensitive value. Keep it private and restart after changing.';
  if(f.type==='bool') return 'Toggle setting. Enabled means True, disabled means False. Most dedicated-server config toggles apply after restart.';
  if(f.type==='number' || f.type==='int') return 'Numeric server setting. Values above or below the default can change balance or performance; restart after saving.';
  if(f.type==='enum') return 'Preset/enum setting. Pick one of the allowed values; restart after saving.';
  if(f.type==='raw') return 'Raw Palworld config value. Keep the exact parentheses/quotes format unless you know the internal IDs.';
  return 'Text server setting. Changes usually apply after saving and restarting the server.';
}
function helpForField(f){
  const extra = SETTING_HELP[f.name] || {};
  const text = extra.text || f.description || defaultHelp(f);
  const desc = f.description && f.description !== text ? f.description : '';
  return {desc, text, tags:extra.tags || ['restart']};
}
function helpForLaunch(k,label){return STARTUP_HELP[k] || {text:label || 'Startup argument for Palworld dedicated server.',tags:['restart']}}
function helpBlock(help){
  const tags = (help.tags || []).map(t=>`<span class="tag ${tagClass(t)}">${esc(t)}</span>`).join('');
  return `${help.desc?`<div class="desc">${esc(help.desc)}</div>`:''}<div class="help-text">${esc(help.text)}</div>${tags?`<div class="help-meta">${tags}</div>`:''}`;
}

function renderLogin(err=''){
  app.innerHTML = `<div class="login"><div class="card">
    <h1>Palworld Control</h1>
    <p>Start, stop, monitor, and tune the server.</p>
    <label>API URL</label><input id="api" value="${esc(API)}">
    <label>Token</label><input id="token" type="password" value="${esc(TOKEN)}">
    ${err?`<p style="color:var(--red);margin-top:10px">${esc(err)}</p>`:''}
    <div style="margin-top:16px"><button class="btn save" id="login">Sign in</button></div>
  </div></div>`;
  $('#login').onclick=async()=>{
    API=$('#api').value.trim().replace(/\/$/,''); TOKEN=$('#token').value.trim();
    try{await req('/api/status'); localStorage.setItem('pal_api',API); localStorage.setItem('pal_token',TOKEN); await init();}
    catch(e){renderLogin(`Login failed: ${e.message}`)}
  };
}

function render(){
  const s = state.status;
  if(!s){app.innerHTML='<div class="wrap"><div class="card">Loading...</div></div>';return}
  const up = !!s.active;
  const players = s.players || [];
  const metrics = s.metrics || {};
  const allowedActions = [
    ['start','start','Start'],
    ['stop','stop','Stop'],
    ['restart','restart','Restart'],
    ['save','save','Save World'],
    ['backup','save','Backup Files'],
    ['update','neutral','Update Image'],
  ].filter(([act])=>canAction(act));
  const tempCard = caps().showTemperatures ? `<section class="card span4"><h2>Temperatures</h2><div class="players">
        ${(s.temps||[]).map(t=>`<span class="pill temp ${tempClass(t.c)}">${esc(t.label)} ${t.c}?C</span>`).join('') || '<span class="empty">No sensors</span>'}
      </div></section>` : '';
  app.innerHTML = `<div class="wrap">
    <header>
      <div class="brand"><span class="dot ${up?'up':'down'}"></span><h1>Palworld Control</h1></div>
      <div class="top-actions"><button class="btn neutral" id="refresh">Refresh</button><button class="btn neutral" id="logout">Logout</button></div>
    </header>
    <div class="grid">
      <section class="card span4"><h2>Server</h2><div class="kv">
        <div class="k">Status</div><div class="v">${up?'<span class="good">Running</span>':'<span class="err">Stopped</span>'}</div>
        <div class="k">Name</div><div class="v">${esc(s.serverInfo?.servername || '-')}</div>
        <div class="k">Version</div><div class="v">${esc(s.serverInfo?.version || '-')}</div>
        <div class="k">Address</div><div class="v"><code>${esc(s.publicIp)}:${esc(s.externalPort)}</code></div>
        <div class="k">Players</div><div class="v">${metrics.currentplayernum ?? players.length}/${metrics.maxplayernum ?? s.launch?.players ?? 4}</div>
        <div class="k">World days</div><div class="v">${metrics.days ?? '-'}</div>
        <div class="k">Uptime</div><div class="v">${fmtUptime(metrics.uptime)}</div>
      </div></section>
      <section class="card span4"><h2>Performance</h2><div class="kv">
        <div class="k">FPS</div><div class="v">${metrics.serverfps ?? '-'}</div>
        <div class="k">Frame time</div><div class="v">${metrics.serverframetime?metrics.serverframetime.toFixed(2)+' ms':'-'}</div>
        <div class="k">Memory</div><div class="v">${s.memory?`${fmtBytes(s.memory.used)} / ${fmtBytes(s.memory.total)} (${s.memory.usedPct}%)`:'-'}</div>
        <div class="k">Disk</div><div class="v">${s.disk?`${fmtBytes(s.disk.free)} free (${s.disk.usedPct}% used)`:'-'}</div>
        <div class="k">Load</div><div class="v">${s.load?s.load.map(x=>x.toFixed(2)).join(' / '):'-'}</div>
      </div></section>
      ${tempCard}
      <section class="card span12"><h2>Actions</h2><div class="top-actions">
        ${allowedActions.map(([act, cls, label])=>`<button class="btn ${cls}" data-act="${act}">${label}</button>`).join('') || '<span class="empty">Read only</span>'}
      </div>${canAction('update')?'<p class="small">Update pulls the current configured Docker image, then restarts the server.</p>':'<p class="small">This token can only run the actions shown here. Everything else is read only.</p>'}</section>
      <section class="card span6"><h2>Players</h2><div class="players">
        ${players.length?players.map(p=>`<span class="pill">${esc(p.name||p.accountName||p.userId)} Lv.${esc(p.level ?? '?')} ${p.ping?`(${Math.round(p.ping)}ms)`:''}</span>`).join(''):'<span class="empty">No players online</span>'}
      </div></section>
      <section class="card span6"><h2>Backups</h2><div class="kv">
        ${(s.backups||[]).slice(0,4).map(b=>`<div class="k">${new Date(b.mtime*1000).toLocaleString()}</div><div class="v">${esc(b.name)} (${fmtBytes(b.size)})</div>`).join('') || '<div class="empty">No backups yet</div>'}
      </div></section>
      <section class="card span12" id="settingsCard"></section>
      <section class="card span12"><div class="logs-wrap"><h2>Logs</h2><span class="small" id="logmeta">auto-refreshing</span></div><pre class="logs" id="logs">Loading logs...</pre></section>
    </div>
  </div>`;
  $('#logout').onclick=()=>{localStorage.removeItem('pal_token');TOKEN='';renderLogin()};
  $('#refresh').onclick=()=>init();
  document.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>action(b.dataset.act));
  renderSettings();
  loadLogs();
}

function fieldHtml(f){
  const id='f_'+f.name.replace(/[^a-z0-9_]/gi,'_');
  const value = f.value ?? '';
  const help = helpForField(f);
  const helpText = [help.desc, help.text, ...(help.tags||[])].filter(Boolean).join(' ').toLowerCase();
  const disabled = canEditSettings() ? '' : 'disabled';
  let input='';
  if(f.type==='bool') input=`<div class="checkrow"><input id="${id}" data-key="${esc(f.name)}" data-type="${f.type}" data-initial-checked="${value?'true':'false'}" type="checkbox" ${value?'checked':''} ${disabled}><span class="bool-state" data-bool-state aria-live="polite"></span></div>`;
  else if(f.type==='enum' && f.choices) input=`<select id="${id}" data-key="${esc(f.name)}" data-type="${f.type}" ${disabled}>${f.choices.map(c=>`<option ${String(value)===c?'selected':''}>${esc(c)}</option>`).join('')}</select>`;
  else if(f.type==='raw') input=`<textarea id="${id}" data-key="${esc(f.name)}" data-type="${f.type}" ${disabled}>${esc(f.raw ?? value)}</textarea>`;
  else input=`<input id="${id}" data-key="${esc(f.name)}" data-type="${f.type}" type="${f.sensitive?'password':(f.type==='int'||f.type==='number')?'number':'text'}" step="${f.type==='int'?'1':'any'}" value="${esc(value)}" ${disabled}>`;
  return `<div class="field" data-name="${esc(f.name.toLowerCase())}" data-desc="${esc(helpText)}">
    <label><span class="name" title="${esc(f.name)}">${esc(f.name)}</span><span class="small">default: ${esc(f.defaultRaw || f.default)}</span></label>
    ${input}
    ${helpBlock(help)}
  </div>`;
}

function bindBooleanFields(root){
  root.querySelectorAll('input[data-type="bool"]').forEach(input=>{
    const label=input.closest('.checkrow')?.querySelector('[data-bool-state]');
    if(!label)return;
    const sync=()=>{
      const enabled=input.checked;
      const dirty=enabled!==(input.dataset.initialChecked==='true');
      label.textContent=`Selected: ${enabled?'ENABLED (True)':'DISABLED (False)'}${dirty?' - NOT SAVED':''}`;
      label.classList.toggle('enabled',enabled);
      label.classList.toggle('disabled',!enabled);
      label.classList.toggle('dirty',dirty);
      input.setAttribute('aria-checked',String(enabled));
    };
    input.addEventListener('change',sync);
    sync();
  });
}

function renderSettings(){
  const root=$('#settingsCard'); if(!root)return;
  if(!canEditSettings() && !canEditStartup()){
    root.remove();
    return;
  }
  if(!state.settings){root.innerHTML='<h2>Settings</h2><div class="small">Loading settings...</div>'; return}
  const groups=state.settings.groups || [];
  if(!state.group) state.group = 'Startup';
  const active = state.group;
  const launch = state.settings.launch || {};
  root.innerHTML = `<div class="settings-toolbar">
    <h2>Settings</h2>
    <input class="search" id="search" placeholder="Search all settings..." value="${esc(state.search)}">
  </div>
  <div class="tabs">
    <button class="tab ${active==='Startup'?'active':''}" data-group="Startup">Startup</button>
    ${groups.map(g=>`<button class="tab ${active===g.name?'active':''}" data-group="${esc(g.name)}">${esc(g.name)} <span class="small">${g.fields.length}</span></button>`).join('')}
  </div>
  <div id="settingsBody"></div>`;
  $('#search').oninput=e=>{state.search=e.target.value.toLowerCase(); renderSettingsBody()};
  document.querySelectorAll('[data-group]').forEach(t=>t.onclick=()=>{state.group=t.dataset.group;renderSettings()});
  renderSettingsBody();
  function renderSettingsBody(){
    const body=$('#settingsBody'), q=state.search;
    if(state.group==='Startup'){
      body.innerHTML = `<div class="form-grid">
        ${launchField('port','UDP listen/public port','number',launch.port)}
        ${launchField('players','Max players launch arg','number',launch.players)}
        ${launchField('NumberOfWorkerThreadsServer','Worker threads','number',launch.NumberOfWorkerThreadsServer)}
        ${launchField('logformat','Log format','text',launch.logformat)}
        ${launchCheck('useperfthreads','-useperfthreads',launch.useperfthreads)}
        ${launchCheck('NoAsyncLoadingThread','-NoAsyncLoadingThread',launch.NoAsyncLoadingThread)}
        ${launchCheck('UseMultithreadForDS','-UseMultithreadForDS',launch.UseMultithreadForDS)}
        ${launchCheck('publiclobby','Community server (-publiclobby)',launch.publiclobby)}
        ${launchField('publicip','Community public IP override','text',launch.publicip)}
        ${launchField('publicport','Community public port override','text',launch.publicport)}
      </div>${canEditStartup()?'<div class="top-actions" style="margin-top:12px"><button class="btn save" id="saveLaunch">Save Startup</button><button class="btn restart" id="saveLaunchRestart">Save Startup + Restart</button></div>':'<p class="small">Startup settings are read only for this token.</p>'}
      <p class="small">Changing the UDP port also requires matching the router forward and firewall. Current router should forward UDP 27015 to this laptop.</p>`;
      if(canEditStartup()){ $('#saveLaunch').onclick=()=>saveLaunch(false); $('#saveLaunchRestart').onclick=()=>saveLaunch(true); }
      return;
    }
    const group=(state.settings.groups||[]).find(g=>g.name===state.group);
    let fields=group?group.fields:[];
    if(q) fields=(state.settings.fields||[]).filter(f=>{
      const h=helpForField(f);
      return f.name.toLowerCase().includes(q)||(f.description||'').toLowerCase().includes(q)||(h.text||'').toLowerCase().includes(q)||(h.tags||[]).join(' ').includes(q);
    });
    body.innerHTML = `<div class="form-grid">${fields.map(fieldHtml).join('')}</div>
      ${canEditSettings()?'<div class="top-actions" style="margin-top:12px"><button class="btn save" id="saveSettings">Save Settings</button><button class="btn restart" id="saveSettingsRestart">Save Settings + Restart</button></div>':'<p class="small">Settings are read only for this token.</p>'}
      <p class="small">Most PalWorldSettings.ini changes require a server restart. Password fields are intentionally hidden for limited tokens.</p>`;
    bindBooleanFields(body);
    if(canEditSettings()){ $('#saveSettings').onclick=()=>saveSettings(false); $('#saveSettingsRestart').onclick=()=>saveSettings(true); }
  }
}
function launchField(k,label,type,val){return `<div class="field"><label><span class="name">${esc(k)}</span></label><input data-launch="${esc(k)}" type="${type}" value="${esc(val??'')}" ${canEditStartup()?'':'disabled'}><div class="desc">${esc(label)}</div>${helpBlock(helpForLaunch(k,label))}</div>`}
function launchCheck(k,label,val){return `<div class="field"><label><span class="name">${esc(k)}</span></label><div class="checkrow"><input data-launch="${esc(k)}" type="checkbox" ${val?'checked':''} ${canEditStartup()?'':'disabled'}><span>${esc(label)}</span></div>${helpBlock(helpForLaunch(k,label))}</div>`}

function readSettingInputs(){
  const out={};
  document.querySelectorAll('[data-key]').forEach(el=>{
    const k=el.dataset.key, t=el.dataset.type;
    out[k]=t==='bool'?el.checked:(t==='int'?parseInt(el.value||'0',10):(t==='number'?parseFloat(el.value||'0'):el.value));
  });
  return out;
}
function readLaunchInputs(){
  const out={};
  document.querySelectorAll('[data-launch]').forEach(el=>{
    const k=el.dataset.launch;
    out[k]=el.type==='checkbox'?el.checked:(el.type==='number'?parseInt(el.value||'0',10):el.value);
  });
  return out;
}
async function saveSettings(restart){
  if(restart&&!confirm(`Save settings and restart Palworld?${playerImpact()}`))return;
  await runBusy(async()=>{try{const r=await req('/api/settings',{method:'POST',body:JSON.stringify({settings:readSettingInputs(),restart})}); state.settings=r.settings; toast(restart?'Settings saved and server restarting':'Settings saved'); await init()}catch(e){toast(e.message,false)}});
}
async function saveLaunch(restart){
  if(restart&&!confirm(`Save startup settings and restart Palworld?${playerImpact()}`))return;
  await runBusy(async()=>{try{const r=await req('/api/launch',{method:'POST',body:JSON.stringify({launch:readLaunchInputs(),restart})}); state.settings.launch=r.launch; toast(restart?'Startup saved and server restarting':'Startup saved'); await init()}catch(e){toast(e.message,false)}});
}
async function action(act){
  const prompts={
    stop:`Stop Palworld?${playerImpact()}`,
    restart:`Restart Palworld?${playerImpact()}`,
    update:`Save, back up, pull the official latest image, and restart Palworld?${playerImpact()}`,
  };
  if(prompts[act]&&!confirm(prompts[act]))return;
  await runBusy(async()=>{try{const r=await req('/api/action',{method:'POST',body:JSON.stringify({action:act})}); if(!r.ok)throw new Error(r.err||r.error||`Action failed during ${r.stage||'execution'}`); toast(`${act} complete`); setTimeout(init,1200)}catch(e){toast(e.message,false)}});
}
async function loadLogs(){try{const r=await req('/api/logs?n=220'); const box=$('#logs'); if(!box)return; box.innerHTML=(r.logs||'').split('\n').map(line=>`<span class="${/error|fail|fatal/i.test(line)?'err':/warn/i.test(line)?'warn':/REST API|Running|version/i.test(line)?'good':/Steam|port|player/i.test(line)?'net':''}">${esc(line)}</span>`).join('\n'); box.scrollTop=box.scrollHeight}catch(e){const box=$('#logs'); if(box)box.textContent=e.message}}
async function init(){try{state.status=await req('/api/status'); state.settings=await req('/api/settings'); render()}catch(e){if(!TOKEN)renderLogin();else renderLogin(e.message)}}
setInterval(async()=>{if(TOKEN&&document.visibilityState==='visible'){try{state.status=await req('/api/status'); await loadLogs()}catch(e){console.warn(e)}}},5000);
init();
</script>
</body>
</html>
